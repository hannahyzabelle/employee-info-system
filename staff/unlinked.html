{% extends "layout.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-panel text-center p-5">
                <i class="bi bi-person-x text-warning display-1 mb-4"></i>
                <h1 class="text-accent-1 mb-3">Account Not Linked</h1>
                <p class="lead text-light mb-4">
                    Your account has been successfully created, but it is not yet linked to an employee record in our system.
                </p>
                <div class="alert alert-info border-secondary bg-dark text-light">
                    <i class="bi bi-info-circle me-2"></i>
                    Please contact your system administrator to link your account to your employee profile.
                </div>
                <div class="mt-4">
                    <a href="/logout" class="btn btn-outline-danger">
                        <i class="bi bi-box-arrow-left me-2"></i>Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
