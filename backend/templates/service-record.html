<!DOCTYPE html>
<html>
<head>
    <title>Service Record</title>

    <!-- Bootstrap (only JS support if needed) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='./style.css') }}">
</head>

<body>

<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>HR Portal</h3>
        </div>

        <nav class="sidebar-menu">
            <a href="/dashboard" class="sidebar-link">Dashboard</a>
            <a href="/employees" class="sidebar-link">Employees</a>
            <a href="/trainings" class="sidebar-link">Trainings</a>
            <a href="/service-record" class="sidebar-link active">Service Record</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- HEADER (like your drawing) -->
        <div class="top-header">
            <h2>Employee Info System</h2>
            <a href="/" class="logout-btn">Logout</a>
        </div>

        <!-- TITLE -->
        <h1>Service Record</h1>

        <!-- ADD FORM -->
        <div class="employee-form">
            <h3>Add Service Record</h3>

            <form method="POST" action="/add_service">
                <label>Employee ID</label>
                <input name="employee_id" required>

                <label>Position</label>
                <input name="position" required>

                <label>Start Date</label>
                <input type="date" name="start">

                <label>End Date</label>
                <input type="date" name="end">

                <label>Agency</label>
                <input name="agency">

                <button class="btn-custom btn-custom-primary">Add Record</button>
            </form>
        </div>

        <!-- TABLE -->
        <div class="table-box">
            <h3>Service Records</h3>

            <table class="table-custom">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Employee</th>
                        <th>Position</th>
                        <th>Agency</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in records %}
                    <tr>
                        <td>{{ r['id'] }}</td>
                        <td>{{ r['employee_id'] }}</td>
                        <td>{{ r['position'] }}</td>
                        <td>{{ r['agency'] }}</td>
                        <td>
                            <a href="/delete_service/{{ r['id'] }}" class="btn-custom btn-custom-secondary">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>
</div>

</body>
</html>
