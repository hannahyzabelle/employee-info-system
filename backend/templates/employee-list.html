<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>

    <!-- Bootstrap (optional for JS only) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='./style.css') }}">
</head>

<body>
<div class="dashboard-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>HR Portal</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="sidebar-link">Dashboard</a>
            <a href="/employees" class="sidebar-link active">Employees</a>
            <a href="/trainings" class="sidebar-link">Trainings</a>
            <a href="/service-record" class="sidebar-link">Service Record</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- HEADER -->
        <div class="top-header">
            <h2>Employees</h2>
        </div>

        <!-- ADD EMPLOYEE -->
        <div class="employee-form">
            <h3>Add Employee</h3>

            <form method="POST" action="/add_employee">
                <label>First Name</label>
                <input name="first_name" required>

                <label>Last Name</label>
                <input name="last_name" required>

                <label>Birthday</label>
                <input type="date" name="birthday" required>

                <label>Status</label>
                <input name="status" placeholder="Permanent / Temporary">

                <button class="btn-custom btn-custom-primary">Add Employee</button>
            </form>
        </div>

        <!-- SEARCH -->
        <div class="employee-form">
            <form method="GET" action="/employees">
                <input type="text" name="search" placeholder="Search employee..." value="{{ search }}">
            </form>
        </div>

        <!-- TABLE -->
        <div class="table-box">
            <h3>Employee List</h3>

            <table class="table-custom">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for emp in employees %}
                    <tr>
                        <td>{{ emp['id'] }}</td>
                        <td>{{ emp['first_name'] }}</td>
                        <td>{{ emp['last_name'] }}</td>
                        <td>{{ emp['status'] }}</td>
                        <td>
                            <!-- VIEW -->
                            <a href="/employee/{{ emp['id'] }}" class="btn-custom btn-custom-primary">View</a>

                            <!-- EDIT (same as view since editable form) -->
                            <a href="/employee/{{ emp['id'] }}" class="btn-custom btn-custom-secondary">Edit</a>

                            <!-- DELETE -->
                            <a href="/delete_employee/{{ emp['id'] }}" class="btn-custom btn-custom-secondary">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </main>
</div>

</body>
</html>
